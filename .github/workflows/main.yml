name: Kittygram CI/CD

on:
  push:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kittygram_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install flake8
      - name: Lint with flake8 (PEP8)
        continue-on-error: true
        run: flake8 backend/ --exclude=backend/cats/migrations,backend/kittygram_backend/settings.py
      - name: Run backend tests
        env:
          SECRET_KEY: test_secret_key
          DEBUG: True
          DB_ENGINE: django.db.backends.postgresql
          POSTGRES_DB: kittygram_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          cd backend/
          python manage.py test
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
      # Frontend tests temporarily disabled due to timeout
      # - name: Run frontend tests
      #   run: |
      #     cd frontend/
      #     npm ci
      #     npm test -- --watchAll=false

  build_and_push:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clean Docker cache
        run: docker system prune -af || true
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest
      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy docker-compose.production.yml to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.production.yml"
          target: "~/kittygram/"
      - name: Deploy on remote server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/kittygram
            docker compose -f docker-compose.production.yml down --remove-orphans || true
            if [ ! -f .env ]; then
              echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
              echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
              echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
              echo "DB_HOST=postgres" >> .env
              echo "DB_PORT=5432" >> .env
              echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
              echo "DEBUG=False" >> .env
              echo "ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}" >> .env
            fi
            docker compose -f docker-compose.production.yml pull
            docker compose -f docker-compose.production.yml up -d --remove-orphans
            docker compose -f docker-compose.production.yml exec -T backend python manage.py migrate
            docker compose -f docker-compose.production.yml exec -T backend python manage.py collectstatic --no-input
            mkdir -p /tmp/static_tmp
            docker cp $(docker compose -f docker-compose.production.yml ps -q frontend):/app/build/. /tmp/static_tmp/
            docker cp /tmp/static_tmp/. $(docker compose -f docker-compose.production.yml ps -q gateway):/static/
            rm -rf /tmp/static_tmp
            docker compose -f docker-compose.production.yml exec -T gateway nginx -s reload

  send_telegram_notification:
    needs: deploy
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Send message to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ *Деплой Kittygram успешно завершён!*
            👤 Автор: ${{ github.actor }}
            📝 Коммит: ${{ github.event.head_commit.message }}
            🔗 Ссылка на коммит: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
            🌐 Проект доступен по адресу: http://${{ secrets.SERVER_HOST }}
          format: markdown